name: auspost-blade-mcp
version: "0.1.1"
description: "Australia Post MCP — postage calculator, shipping, tracking, and locations via official AusPost APIs"
author: Groupthink-dev
license: MIT
tier: certified
author_type: first-party
readiness: production
homepage: https://github.com/Groupthink-dev/auspost-blade-mcp
contract: postal-v1

services:
  postal:
    postcode_search: auspost_postcode_search
    domestic_services: auspost_domestic_services
    domestic_calculate: auspost_domestic_calculate
    international_services: auspost_international_services
    international_calculate: auspost_international_calculate
    letter_services: auspost_letter_services
    letter_calculate: auspost_letter_calculate
    parcel_sizes: auspost_parcel_sizes
    country_list: auspost_country_list
    locations: auspost_locations
    account: auspost_account
    validate_address: auspost_validate_address
    create_shipment: auspost_create_shipment
    get_shipments: auspost_get_shipments
    create_order: auspost_create_order
    get_order: auspost_get_order
    create_labels: auspost_create_labels
    get_labels: auspost_get_labels
    get_prices: auspost_get_prices
    track: auspost_track

setup:
  icon: "📮"
  blurb: "Postage calculator, parcel tracking, shipping labels, and post office locations"
  auth_model: api_key
  complexity: moderate
  fields:
    - key: AUSPOST_API_KEY
      label: "AusPost API Key"
      secret: true
      required: true
      placeholder: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
      help: "Free API key from https://developers.auspost.com.au — required for all tools"
    - key: AUSPOST_SHIPPING_API_KEY
      label: "Shipping API Key"
      secret: true
      required: false
      placeholder: "UUID from eParcel contract"
      help: "Shipping & Tracking API key — requires eParcel or StarTrack contract"
    - key: AUSPOST_SHIPPING_API_PASSWORD
      label: "Shipping API Password"
      secret: true
      required: false
      placeholder: "API password"
      help: "Shipping & Tracking API password — paired with Shipping API Key"
    - key: AUSPOST_ACCOUNT_NUMBER
      label: "Account Number"
      secret: false
      required: false
      placeholder: "1234567890"
      help: "10-digit eParcel account number"
    - key: AUSPOST_WRITE_ENABLED
      label: "Enable Write Operations"
      secret: false
      required: false
      default: "false"
      help: "Set to 'true' to enable shipment creation, order placement, and label generation"
    - key: AUSPOST_SHIPPING_TEST_MODE
      label: "Shipping Test Mode"
      secret: false
      required: false
      default: "false"
      help: "Set to 'true' to use the AusPost test sandbox (no real shipments created)"
  test:
    endpoint: "https://digitalapi.auspost.com.au/postcode/search.json?q=Sydney"
    auth_style: header
    auth_header: "AUTH-KEY"
    auth_value: "{AUSPOST_API_KEY}"
  help:
    - label: "Get a free API key"
      url: "https://developers.auspost.com.au"
    - label: "PAC API documentation"
      url: "https://developers.auspost.com.au/apis/pac"
    - label: "Shipping & Tracking API"
      url: "https://developers.auspost.com.au/apis/shipping-and-tracking"

install:
  runtime: uv
  package: auspost-blade-mcp
  command: auspost-blade-mcp

env:
  - name: AUSPOST_API_KEY
    description: "PAC + Locations API key (free tier)"
    secret: true
  - name: AUSPOST_SHIPPING_API_KEY
    description: "Shipping & Tracking API key (eParcel contract)"
    secret: true
  - name: AUSPOST_SHIPPING_API_PASSWORD
    description: "Shipping & Tracking API password"
    secret: true
  - name: AUSPOST_ACCOUNT_NUMBER
    description: "10-digit eParcel billing account number"
    secret: false
  - name: AUSPOST_WRITE_ENABLED
    description: "Enable shipment/order/label creation"
    secret: false
    default: "false"
  - name: AUSPOST_SHIPPING_TEST_MODE
    description: "Use AusPost test sandbox"
    secret: false
    default: "false"
  - name: AUSPOST_MCP_TRANSPORT
    description: "Transport mode: stdio (default) or http"
    secret: false
    default: "stdio"
  - name: AUSPOST_MCP_API_TOKEN
    description: "Bearer token for HTTP transport authentication"
    secret: true

requires:
  sidereal: ">=0.3.0"

conformance:
  required: "10/10"
  recommended: "5/5"
  optional: "2/2"
  gated: "4/4"
  last_tested: "2026-04-07"
